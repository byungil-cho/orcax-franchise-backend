<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrcaX 가맹점 신청</title>
</head>
<body>
  <h1>가맹점 신청서</h1>

  <form id="applyForm">
    <label for="name">이름:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="phone">전화번호:</label>
    <input type="text" id="phone" name="phone" required><br><br>

    <label for="message">메시지:</label>
    <textarea id="message" name="message" required></textarea><br><br>

    <button type="submit">신청</button>
  </form>

  <div id="result" style="margin-top:20px; font-weight:bold;"></div>

  <script>
    document.getElementById("applyForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        message: document.getElementById("message").value
      };

      try {
        const res = await fetch("https://orcax-backend.onrender.com/apply", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        document.getElementById("result").textContent = "✅ 서버 응답: " + result.message;
      } catch (err) {
        document.getElementById("result").textContent = "❌ 오류 발생: " + err.message;
      }
    });
  </script>
</body>
</html>
