<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가맹점 신청서</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; }
    input, textarea { width: 100%; padding: 8px; margin: 6px 0; }
    button { background: #0066ff; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; }
    #result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>가맹점 신청서</h2>
  <form id="form">
    <input name="name" placeholder="상호" required />
    <input name="phone" placeholder="연락처" required />
    <input name="biznum" placeholder="사업자등록번호" required />
    <input name="region" placeholder="지역" required />
    <input name="address" placeholder="사업장 주소" required />
    <input name="type" placeholder="업종 및 종목" required />
    <textarea name="message" placeholder="비고사항" rows="3"></textarea>
    <button type="submit">신청하기</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(this).entries());

      try {
        const res = await fetch("https://orcax-franchise-backend.onrender.com/apply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData),
        });
        const result = await res.json();
        document.getElementById("result").textContent = "✅ " + result.message;
      } catch (err) {
        document.getElementById("result").textContent = "❌ 오류: " + err.message;
      }
    });
  </script>
</body>
</html>
