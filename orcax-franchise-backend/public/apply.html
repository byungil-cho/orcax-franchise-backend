<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>가맹점 신청</title>
</head>
<body>
  <h1>가맹점 신청서</h1>
  <form id="apply-form">
    <label>이름: <input type="text" id="name" required></label><br/>
    <label>전화번호: <input type="text" id="phone" required></label><br/>
    <label>메시지: <textarea id="message" required></textarea></label><br/>
    <button type="submit">신청</button>
  </form>

  <script>
    document.querySelector('#apply-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const data = {
        name: document.querySelector('#name').value,
        phone: document.querySelector('#phone').value,
        message: document.querySelector('#message').value
      };

      fetch("https://orcax-backend.onrender.com/apply", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
        .then(res => res.json())
        .then(res => {
          alert("서버 응답: " + res.message);
        })
        .catch(err => {
          alert("에러 발생: " + err.message);
        });
    });
  </script>
</body>
</html>
